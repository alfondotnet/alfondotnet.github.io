<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alfon.net</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .home {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem 2rem;
        }

        .home-inner {
            max-width: 460px;
            width: 100%;
        }

        .home-title {
            margin-bottom: 2.5rem;
        }

        .home-links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .home-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            background: var(--color-white);
            border: 1px solid var(--border-oat);
            border-radius: var(--radius-feature);
            box-shadow: var(--shadow-clay);
            transition:
                transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                box-shadow 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                background-color 0.25s;
        }

        .home-link:hover {
            transform: rotateZ(-3deg) translateY(-4px);
            box-shadow: var(--shadow-hard);
        }

        .home-link:nth-child(1):hover { background: var(--ube-300); }
        .home-link:nth-child(2):hover { background: var(--slushie-500); }

        .home-link .icon {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-standard);
            overflow: hidden;
            flex-shrink: 0;
        }

        .home-link .icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .home-link .name {
            font-weight: 500;
            font-size: 1rem;
            letter-spacing: -0.16px;
        }

        .home-link .meta {
            margin-left: auto;
            color: var(--warm-silver);
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1.08px;
            text-transform: uppercase;
        }

        .home-email {
            margin-top: 3rem;
            color: var(--warm-silver);
            font-size: 0.875rem;
        }

        .home-email a {
            color: var(--warm-charcoal);
            border-bottom: 1px dashed var(--border-oat);
            transition: color 0.2s;
        }

        .home-email a:hover { color: var(--color-black); }
    </style>
</head>
<body>
    <div class="home">
        <div class="home-inner">
            <h1 class="home-title t-section-heading">alfon.net</h1>
            <div class="home-links">
                <a href="readvortex.html" class="home-link">
                    <span class="icon"><img src="readVortex_icon.png" alt="ReadVortex"></span>
                    <span class="name">ReadVortex</span>
                    <span class="meta">App</span>
                </a>
                <a href="nowax.html" class="home-link">
                    <span class="icon"><img src="nowax_logo.png" alt="NOWAX"></span>
                    <span class="name">NOWAX</span>
                    <span class="meta">US Distribution</span>
                </a>
            </div>
            <p class="home-email"><a href="mailto:hello@alfon.net">hello@alfon.net</a></p>
        </div>
    </div>
</body>
</html>
